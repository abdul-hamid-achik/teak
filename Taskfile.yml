version: "3"

tasks:
  build:
    desc: Build the teak binary
    cmds:
      - go build -o bin/teak ./cmd/teak
    sources:
      - ./**/*.go
    generates:
      - bin/teak

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  run:
    desc: Build and run teak
    deps: [build]
    cmds:
      - ./bin/teak {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
