version: "3"

tasks:
  build:
    desc: Build the teak binary
    cmds:
      - go build -o bin/teak ./cmd/teak
    sources:
      - ./**/*.go
    generates:
      - bin/teak

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  demos:
    desc: Generate VHS demo videos
    deps: [build]
    dir: examples/vhs
    cmds:
      - for: ["teak-basic-demo.tape", "teak-filetree-demo.tape", "teak-features-demo.tape"]
        cmd: vhs {{ .ITEM }}

  demo-basic:
    desc: Generate basic usage demo
    deps: [build]
    cmds:
      - vhs examples/vhs/teak-basic-demo.tape

  demo-filetree:
    desc: Generate file tree demo
    deps: [build]
    cmds:
      - vhs examples/vhs/teak-filetree-demo.tape

  demo-features:
    desc: Generate features demo
    deps: [build]
    cmds:
      - vhs examples/vhs/teak-features-demo.tape

  run:
    desc: Build and run teak
    deps: [build]
    cmds:
      - ./bin/teak {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
