name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test with race detection and coverage
        run: go test ./... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage threshold
        run: |
          # Get overall coverage percentage
          COVERAGE=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"

          # Per-package coverage
          echo ""
          echo "Per-package coverage:"
          go test ./... -cover 2>&1 | grep -E "coverage:|no test files" || true

          # Current overall threshold is 40% (will increase as we add more tests)
          THRESHOLD="40"
          COVERAGE_INT=$(echo "$COVERAGE" | cut -d'.' -f1)
          if [ "$COVERAGE_INT" -lt "$THRESHOLD" ]; then
            echo "❌ Coverage ${COVERAGE}% is below threshold of ${THRESHOLD}%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold of ${THRESHOLD}%"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Vet
        run: go vet ./...

      - name: Build binary
        run: go build -o bin/teak ./cmd/teak
